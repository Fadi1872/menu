<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&display=swap"
      rel="stylesheet"
    />
    <title>Menu</title>
  </head>
  <body>
    <div class="neon-animated-bg">
      <div class="subbody">
        <div class="slider-container">
          <div class="slider-track">
            <div class="slide" id="mojito"></div>
            <div class="slide" id="hotdrinks"></div>
            <div class="slide" id="worldcup"></div>
            <div class="slide" id="shisha"></div>
          </div>
        </div>
      </div>

      <footer class="site-footer">
        <div class="footer-container">
          <div class="footer-logo-box">
            <img
              src="images/logo.png"
              alt="شعار صالون جوليا"
              class="footer-logo-animated"
            />
          </div>

          <div class="footer-info">
            <h3 class="management-title">بإدارة باسل نجار</h3>

            <div class="contact-numbers">
              <p class="contact-item">
                <span>للتواصل والحجز:</span>
                <a href="tel:0935504952" class="neon-text-blue">0935504952</a>
                <span class="separator">-</span>
                <a href="tel:0935984223" class="neon-text-blue">0935984223</a>
              </p>
            </div>
          </div>

          <div class="footer-social">
            <a
              href="https://www.facebook.com/share/1EQXh2kLAo/"
              target="_blank"
              class="facebook-btn"
            >
              <i class="fab fa-facebook-f"></i> صفحة الفيسبوك
            </a>
          </div>
        </div>
      </footer>
    </div>

    <div id="loading-screen">
      <div class="loader-content">
        <img src="images/logo.png" alt="Logo" class="loading-logo" />
        <div class="loading-bar"></div>
      </div>
    </div>

    <div id="mobile-only-overlay">
      <div class="overlay-card">
        <img src="images/logo.png" alt="Logo" class="overlay-logo" />
        <h2>عذراً، هذا الموقع مخصص للهواتف المحمولة فقط 📱</h2>
        <p>
          يرجى مسح رمز الـ QR الخاص بالمنيو أو فتح الرابط من خلال هاتفك المحمول
          لتجربة تصفح مثالية.
        </p>
      </div>
    </div>

    <script src="js/menu.js" type="module"></script>
  </body>
</html>
